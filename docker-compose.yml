services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todays_dollars
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - todays-dollars-db:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d todays_dollars']
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  todays-dollars-db:
